---
name: JS Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.css'
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - 'tsconfig.json'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.css'
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Biome + TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bunx tsc --noEmit
