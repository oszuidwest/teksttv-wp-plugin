---
name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml'
      - 'phpcs.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-bootstrap.php'
      - 'phpunit.xml'
      - 'patchwork.json'
      - 'tests/**'
      - 'languages/**'
  pull_request:
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml'
      - 'phpcs.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-bootstrap.php'
      - 'phpunit.xml'
      - 'patchwork.json'
      - 'tests/**'
      - 'languages/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    uses: oszuidwest/.github-templates/.github/workflows/wp-ci.yml@v2

  test:
    name: PHPUnit ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: PHPUnit
        run: vendor/bin/phpunit
