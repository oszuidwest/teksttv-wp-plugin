name: Build Plugin

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - uses: oven-sh/setup-bun@v2

      - uses: ramsey/composer-install@v3
        with:
          composer-options: "--no-dev --optimize-autoloader"

      - run: bun install

      - run: bun run build

      - name: Package plugin
        run: |
          mkdir -p dist/teksttv
          cp -r src/ dist/teksttv/src/
          cp -r assets/ dist/teksttv/assets/
          cp -r vendor/ dist/teksttv/vendor/
          cp teksttv.php dist/teksttv/
          cp composer.json dist/teksttv/
          cp README.md dist/teksttv/
          cd dist && zip -r ../teksttv.zip teksttv/

      - uses: actions/upload-artifact@v4
        with:
          name: teksttv-plugin
          path: teksttv.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: teksttv.zip
