---
name: Build Plugin

on:
  push:
    branches: [main]
    paths:
      - '**/*.php'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.css'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'bun.lock'
      - 'teksttv.php'
      - 'src/**'
      - 'resources/**'
  pull_request:
    paths:
      - '**/*.php'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.css'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'bun.lock'
      - 'teksttv.php'
      - 'src/**'
      - 'resources/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - uses: oven-sh/setup-bun@v2

      - uses: ramsey/composer-install@v4
        with:
          composer-options: "--no-dev --optimize-autoloader"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Verify build output
        run: test -f assets/admin.js && test -f assets/admin.css
