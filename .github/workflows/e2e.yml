---
name: E2E

on:
  push:
    branches: [main]
    paths:
      - '**/*.php'
      - 'resources/**'
      - 'tests/e2e/**'
      - '.wp-env.json'
      - 'playwright.config.ts'
      - 'bin/package-plugin.sh'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - '**/*.php'
      - 'resources/**'
      - 'tests/e2e/**'
      - '.wp-env.json'
      - 'playwright.config.ts'
      - 'bin/package-plugin.sh'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: WordPress smoke (build + activate + REST + browser)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Install production PHP dependencies
        run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build assets and package the plugin artifact
        run: bun run build:package

      - name: Start WordPress (wp-env)
        run: bunx wp-env start

      - name: Assert the built artifact activated with vendor and assets
        run: |
          bunx wp-env run cli wp plugin is-active teksttv
          bunx wp-env run cli bash -c "test -f wp-content/plugins/teksttv/vendor/autoload.php && test -f wp-content/plugins/teksttv/assets/admin.js"

      - name: Load fixtures
        run: bun run test:e2e:fixtures

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run e2e suite
        run: bunx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
